name: Restart Hugging Face Space

on:
  schedule:
    # Esegue lo script ogni giorno alle 01:00 UTC (mezzanotte)
    - cron: '0 1 * * *'
  workflow_dispatch: # Questo ti permette di avviarlo anche manualmente cliccando un tasto

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Restart Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')
          api.restart_space(repo_id='Marco224/EasyProxy')
          print('Spazio riavviato con successo!')
          "
